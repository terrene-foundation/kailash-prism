          surface a "manual supplement required" finding. Reporting "no
          findings" without running the equivalent check IS the substitution
          failure mode blocked by sweep-completeness.md Rule 1.
    must_not_clauses:
      - "MUST NOT report Sweep 5 'clean' when the per-workspace check returned empty AND no repo-level fallback was attempted."
      - "MUST NOT silently substitute a cheaper proxy (cite-check, grep) for the spec-vs-source check without human approval per sweep-completeness.md Rule 1."
    blocked_rationalizations:
      - "the per-workspace loop returned empty — sweep is N/A here"
      - "repo-level specs are /redteam territory, not /sweep"
      - "no workspaces use specs/ in this repo, so Sweep 5 is naturally clean"
      - "the supplemental supplement is excessive cost — cite-check is enough"
