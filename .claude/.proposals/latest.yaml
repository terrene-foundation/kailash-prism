  - rule_candidate: memory-citation-grounding
    suggested_tier: coc-global
    suggested_priority: 5
    suggested_scope: baseline
    suggested_paths: ["**"]
    target: |
      EITHER new rules/memory-citation-grounding.md (preferred — distinct
      principle from Rule 1c)
      OR fold-into-existing rules/zero-tolerance.md as a sibling clause to
      Rule 1c ("Pre-existing is unprovable after context boundary"); both
      enforce the same OBSERVED-vs-ASSUMED grounding contract.
    retier_note: |
      Re-tiered from skill-embedded (sweep-only) → coc-global per cc-architect
      red-team finding: the principle applies to EVERY command that cites
      memory content in user-visible artifacts, not just /sweep. /sweep
      keeps a one-line reminder in commands/sweep.md § Sweep 3, but the
      enforcement contract lives at the rules layer.
    must_clauses:
      - id: 1
        title: "Memory citations in user-visible artifacts MUST come from a Read of the canonical file"
        body: |
          When any command, agent, or skill cites a memory file as evidence
          in a user-visible artifact (GitHub issue, PR body or comment,
          public report, journal entry users may read, slash-command
          response shown to user), the citation MUST be produced by reading
          the canonical memory file (`~/.claude/<account>/<project>/memory/<name>.md`),
          NOT by paraphrasing the MEMORY.md index one-line hook. The index
          hook is a relevance signal, not authoritative content; it CAN
          drift from the underlying file because MEMORY.md is hand-edited.
      - id: 2
        title: "Read MUST land in the same session as the citation"
        body: |
          The Read of the canonical memory file MUST occur in the same
          session as the user-visible artifact that cites it. Recalled
          content from a prior session is BLOCKED for the same provenance-
          unfalsifiability reason as zero-tolerance.md Rule 1c — after
          /clear, auto-compaction, or context boundary, the agent has no
          audit trail of what the file said when last seen.
    must_not_clauses:
      - "MUST NOT cite memory content from the MEMORY.md index summary in a public-record artifact (issue, PR, comment, public report)."
      - "MUST NOT close an issue, file a sweep finding, or post a public artifact whose disposition rests on memory the agent did not Read in the SAME session."
      - "MUST NOT rely on the index hook even when the agent 'recalls' that the underlying file matches — recall is not observation."
    blocked_rationalizations:
      - "the index summary IS the memory's headline — paraphrase is fine"
      - "the file content matches the index, no Read needed"
      - "Reading every memory cite is bureaucracy"
      - "the disposition is obvious from the index alone"
      - "the user just told me the memory in chat, I don't need to Read it"
      - "I Read it three turns ago, the content can't have changed"
    audit_protocol: |
      Mechanical detection at /redteam (or post-publish audit):
      1. Enumerate user-visible artifacts emitted in the session: issue
         closes (`gh issue close`), PR comments (`gh pr comment`), PR
         bodies (`gh pr create --body`), public reports written to repo
         root (e.g., `SWEEP-*.md`), journal entries under
         `workspaces/*/journal/`.
      2. For each artifact, grep for memory file references — any of:
         `<name>.md` patterns matching a known memory file, `MEMORY.md`
         direct citations, "per memory" / "per project_*.md" prose hooks.
      3. For every match, walk the session's tool-call log for a Read of
         that canonical memory file PRIOR to the artifact's emission.
      4. Match without prior Read = HIGH finding (disposition: revise the
         artifact OR explicitly mark it as "index-summary-only" and accept
         the audit-trail gap as an exception).
    origin: |
