  - rule_candidate: sweep-skill-repo-level-specs-fallback
    suggested_tier: coc-global
    suggested_priority: 15
    suggested_scope: skill-embedded
    target: commands/sweep.md § Sweep 5 (Spec compliance spot-check)
    skill_clause:
      title: "Sweep 5 MUST fall back to repo-level docs/specs/ when per-workspace specs/ absent"
      body: |
        Current skill text iterates `for ws in workspaces/*/; [ -d "$ws/specs" ]`
        and silently produces an empty result for any repo whose spec authority
        lives at the repo root (kailash-prism's docs/specs/00-prism-manifest.md
        … 10-quality-gates.md, including the 13 sub-files of 05*). Returning
        empty + reporting "no findings" is the substitution failure mode that
        rules/sweep-completeness.md Rule 1 blocks.

        Skill MUST detect this case and either:
          (a) fall back to a repo-level scan against docs/specs/ (run the
              equivalent spec-vs-source compliance check at the level the repo
              uses), OR
          (b) explicitly emit a "manual supplement required" finding documenting
              that the per-workspace assumption does not hold for this repo
              shape, so the report cannot ship "clean" without supplemental
              spot-check.
    must_clauses:
      - id: 1
        title: "Sweep 5 MUST detect repo-level spec authority and adapt"
        body: |
