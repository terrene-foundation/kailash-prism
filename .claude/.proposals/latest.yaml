  - rule_candidate: orphan-detection-library-vs-application-applicability
    suggested_tier: coc-global
    suggested_priority: 5
    suggested_scope: baseline
    target: rules/orphan-detection.md
    must_clauses:
      - id: 1
        title: "Library-class artifacts: public exports ARE the hot path"
        body: |
          rules/orphan-detection.md is currently authored against
          application-framework artifacts (DataFlow, Nexus, Kaizen) where the
          framework's hot path is INTERNAL — `DataFlow.express.list()` calls
          `db.trust_executor.check_read_access()` inside the framework's own
          source tree. The MUST Rule 1 ("Every db.* / app.* facade has a
          production call site within 5 commits") is well-defined for this
          shape.

          For LIBRARY-class artifacts (UI component libraries like
          kailash-prism, parser libraries, utility libraries), the hot path
          IS the public export surface — `web/src/index.ts` exports
          `Sidebar`, `Breadcrumbs`, `MobileHeader`, `NavigationConfig`, and
          downstream consumers (arbor, etc.) call them directly. There is no
          internal callsite to find; the rule's premise (`zero matches in the
          hot path = orphan`) returns false-positives because it is auditing
          the wrong surface.

          The rule MUST distinguish the two contexts and define the audit
          surface for each:
            - Application framework: orphan = no internal callsite in
              framework hot path within 5 commits.
            - Library: orphan = no public export from the library's index
              file (`src/index.ts`, `lib.rs`, `__init__.py`) AND no Tier 2/E2E
              test importing through that surface within 5 commits.
      - id: 2
        title: "Library audit surface — public-export grep + downstream-consumer test"
        body: |
          For library-class artifacts, the orphan audit MUST grep:
            (a) the library's public index file for the symbol's export, AND
            (b) the library's Tier 2/wiring tests for an import of the symbol
                through the public package name (not via internal path).
          A symbol with (a) but not (b) is a HIGH finding — exported but
          unverifiable. A symbol with (b) but not (a) is a MED finding —
          tested but unreachable to consumers.
    must_not_clauses:
      - "MUST NOT classify a library symbol as orphan when the public-export entry file (`src/index.ts` / `lib.rs` `pub use` / `__init__.py` `__all__`) contains the symbol AND a Tier 2/wiring test imports it via package name."
      - "MUST NOT classify a library's exported symbol as an orphan based solely on absence of internal callsites — by design, the consumer IS the callsite."
      - "MUST NOT apply the application-framework orphan audit to a library repo without first re-anchoring the audit surface to the public-export file."
    blocked_rationalizations:
      - "the rule is rule, no carve-outs"
      - "library context is just a special case of application framework"
      - "the agent should infer library-vs-application from repo type"
      - "downstream consumers are out-of-repo, can't audit them anyway"
    audit_protocol: |
      Library-class detection (apply BEFORE the orphan audit):
      1. Check for a single public-export entry point: `<package>/src/index.ts`,
         `<package>/lib.rs` with `pub use`, or `<package>/__init__.py` with
         `__all__`. If present AND the package is consumed via name (not by
         path) downstream, treat as library-class.
      2. For library-class repos, redirect the orphan audit:
         - Surface scan: enumerate symbols re-exported from the public entry.
         - "Hot path" grep: search the library's tests/integration/ and
           tests/e2e/ for `import { ... } from '<package-name>'` (NOT
           internal path).
         - Disposition: same FIXED/DELETED/UNVERIFIED triad.
    origin: |
      kailash-prism /sweep 2026-05-06 supplemental. Sweep 5 supplemental's
      agent-flagged ORPHAN ("navigation engine zero callsites") was DOWNGRADED
      to false positive on verification: prism is a UI library, not an
      application; the framework's hot path IS the public export via
      `web/src/index.ts:99` (which exports `NavigationConfig`) and
      `web/src/engines/navigation.tsx` (which exports `Sidebar`, `Breadcrumbs`,
      `MobileHeader`). rules/orphan-detection.md is written for application
      frameworks; the library context fails its premise. Per SWEEP-2026-05-06.md
      § "Sweep 5 summary": "Worth a /codify clause for that rule." The fix is
      not to weaken the rule but to define the audit surface separately for
      library- vs application-class artifacts so both classes have a real
      orphan check.
    cross_cli_slot_partition:
      neutral_body: "orphan audit surface differs between application-framework and library-class repos"
      examples_slot: "language/framework-specific export-surface examples (TS index.ts, Rust pub use, Python __all__)"

  - rule_candidate: session-end-pending-stub-duplicate-suppression
    suggested_tier: coc-global
    suggested_priority: 30
    suggested_scope: skill-embedded
    target: .claude/hooks/session-end.js § generateJournalCandidates
    must_clauses:
      - id: 1
        title: "SessionEnd MUST skip stub generation for commits already documented in canonical artifacts"
        body: |
          generateJournalCandidates() currently classifies every session
          commit matching a journal-worthy literal pattern and writes a stub
          to `<workspace>/journal/.pending/`. Commits whose subject or SHA
          already appears in a canonical session artifact — a `SWEEP-*.md`
          report at the repo root, the body of an open or merged PR opened
          this session, or an existing journal entry under
          `<workspace>/journal/NNNN-*.md` — are duplicate stubs from the
          moment they are written. The next session has no signal to
          distinguish duplicate-of-already-captured from genuinely-novel,
          and the .pending/ directory accumulates across sessions.

          Hook MUST add a pre-write filter: for each candidate commit,
          check (a) whether the short SHA appears in any `SWEEP-*.md` at
          repo root with mtime within the session window, (b) whether the
          short SHA appears in `gh pr list --state all --search '<sha>'`
          output cached at session start, OR (c) whether a journal entry
          under `<workspace>/journal/` references the SHA. A match on any
          of (a/b/c) → skip the stub. The active workspace's
          `journal/.pending/` directory is created only if at least one
          candidate survives the filter, so a duplicate-only session
          leaves no .pending/ residue.
      - id: 2
        title: "Filter MUST be cheap and bounded"
        body: |
          Hook budget is 3s wall-clock total per existing constraint
          (line 364). Filter MUST stay under ~500ms additional cost:
          (a) glob+grep across `SWEEP-*.md` (≤5 files typical, <50ms);
          (b) gh PR query is one cached call at session start, reused per
              commit (no per-commit fork);
          (c) journal grep is `grep -l <short-sha> workspaces/*/journal/`
              (single fs walk, <100ms).
          If the filter exceeds budget on any single commit, hook falls
          through to the original write-stub behavior — never blocks the
          session-end critical path.
    must_not_clauses:
      - "MUST NOT delete any existing .pending/ stubs as a side effect of the filter — purge is a separate concern owned by /wrapup or manual cleanup."
      - "MUST NOT drop the stub silently with no audit trail — when the filter suppresses a candidate, append a one-line entry to the session's hook log noting `[suppressed: <sha> matched <artifact>]` so the dedup is grep-able."
      - "MUST NOT extend the filter to semantic similarity (subject-line fuzzy match, body-text comparison) — only literal SHA presence is hook-legal per cc-artifacts.md MUST NOT 'No semantic analysis in hooks'."
    blocked_rationalizations:
      - "the next session can just delete the duplicates"
      - "the cost of the filter exceeds the cost of manual cleanup"
      - ".pending/ accumulation is benign — the directory is git-ignored"
      - "if the user wants no duplicates they should run /wrapup"
      - "the misroute (wrong workspace) is the real bug; filter doesn't fix that"
    audit_protocol: |
      Detection at /codify validation (cc-architect mechanical sweep):
      1. Read .claude/hooks/session-end.js around generateJournalCandidates.
      2. Confirm the function calls a filter helper before writing stubs.
      3. Confirm the helper checks: SWEEP-*.md grep, gh PR cache, journal
         grep — each via a literal SHA match (no semantic comparison).
      4. Confirm the helper has a wall-clock budget guard that falls
         through to original behavior on overrun.
      5. Audit fixture committed at .claude/audit-fixtures/session-end/
         covering: (a) commit referenced in SWEEP report → suppressed,
         (b) commit referenced in PR body → suppressed, (c) commit
         referenced in journal entry → suppressed, (d) genuinely-novel
         commit → stub written, (e) filter-budget-exceeded → fallback to
         original behavior.
    do_examples:
      - "// session-end.js generateJournalCandidates pre-write filter
        if (await isAlreadyDocumented(hash, sessionContext)) {
        await appendHookLog(`[suppressed: ${hash.slice(0,7)} matched ${matchSource}]`);
        continue;
        }"
    do_not_examples:
