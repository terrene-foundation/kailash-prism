name: Release @kailash/prism-web

# Packages the `web/` workspace into a `.tgz` tarball and attaches it to a
# GitHub Release whenever a `web-v*` tag is pushed. Consumers install the
# tarball directly via its GitHub Release asset URL — see
# `docs/guides/distribution.md` for the full distribution contract.

on:
  push:
    tags:
      - 'web-v*'

permissions:
  contents: write   # required to create the release and upload the asset

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Pack tarball
        id: pack
        working-directory: web
        run: |
          set -euo pipefail
          tarball="$(npm pack --silent)"
          echo "tarball=${tarball}" >> "$GITHUB_OUTPUT"
          echo "tarball_path=web/${tarball}" >> "$GITHUB_OUTPUT"
          ls -l "${tarball}"

      - name: Verify tag version matches package.json
        working-directory: web
        run: |
          set -euo pipefail
          tag_ref="${GITHUB_REF_NAME}"
          tag_version="${tag_ref#web-v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "${tag_version}" != "${pkg_version}" ]; then
            echo "::error::Tag ${tag_ref} (version ${tag_version}) does not match web/package.json version ${pkg_version}"
            exit 1
          fi
          echo "Tag and package.json agree on version ${pkg_version}"

      - name: Extract release notes from CHANGELOG
        id: notes
        working-directory: web
        run: |
          set -euo pipefail
          tag_ref="${GITHUB_REF_NAME}"
          version="${tag_ref#web-v}"
          notes_file="$(mktemp)"
          # Support two header styles:
          #   "## [0.3.1]"                 — Keep a Changelog
          #   "## 0.3.1 — 2026-04-18 — …"  — current CHANGELOG.md style
          awk -v ver="${version}" '
            BEGIN { in_section = 0 }
            /^## / {
              if (in_section) { exit }
              if ($0 ~ "^## \\[" ver "\\]" || $0 ~ "^## " ver "( |$|—)") {
                in_section = 1
                next
              }
            }
            in_section { print }
          ' CHANGELOG.md > "${notes_file}" || true
          if [ ! -s "${notes_file}" ]; then
            echo "No matching CHANGELOG section for ${version}; falling back to generic body." >&2
            printf 'Release %s of @kailash/prism-web.\n\nSee web/CHANGELOG.md for details.\n' "${version}" > "${notes_file}"
          fi
          echo "notes_file=${notes_file}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload tarball
        # Pinned by SHA for supply-chain safety — tag refs are movable.
        # v2.6.2 = 3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.notes_file }}
          files: ${{ steps.pack.outputs.tarball_path }}
          fail_on_unmatched_files: true
