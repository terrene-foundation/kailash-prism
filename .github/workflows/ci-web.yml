name: CI — @kailash/prism-web

# PR-time validation for web/. Closes the gap that release-web.yml leaves:
# release-web.yml only fires on web-v* tag push, so changes to web/ have
# no CI signal until tag time. This workflow runs npm ci/lint/build/test:run
# on every PR touching web/ across the declared engines.node floor (Node 22 LTS)
# AND the release pin (Node 24).

on:
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/ci-web.yml"
  push:
    branches: [main]
    paths:
      - "web/**"

permissions:
  contents: read

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "24"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Build
        working-directory: web
        run: npm run build

      - name: Test
        working-directory: web
        run: npm run test:run
