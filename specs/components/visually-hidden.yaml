platform_notes:
  web: >
    Apply the standard visually-hidden CSS pattern: position: absolute,
    width: 1px, height: 1px, padding: 0, margin: -1px, overflow: hidden,
    clip: rect(0 0 0 0), white-space: nowrap, border: 0. Do NOT use
    display: none or visibility: hidden as those remove the element from
    the accessibility tree entirely. If the hidden content contains a
    focusable element, consider showing it on focus (the "skip to content"
    pattern).
  flutter: >
    Use Semantics widget to provide screen reader content without rendering
    a visible widget. Wrap the child in an Offstage(offstage: true) or a
    SizedBox.shrink() combined with Semantics to keep the content in the
    semantics tree while hiding it visually. Alternatively, use
    ExcludeSemantics on the visual content and provide a separate Semantics
    node with the desired label. Do NOT use Visibility(visible: false) as
    it removes the widget from the semantics tree.
