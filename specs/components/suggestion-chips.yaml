# Kailash Prism — SuggestionChips AI Organism Contract
# Source: docs/specs/03-component-contracts.md § 3.4.22
# Grid or inline row of clickable suggestion chips that guide user interaction with the AI.

version: "0.1.0"

name: SuggestionChips
category: ai-organism
description: "Grid or inline row of clickable suggestion chips that guide user interaction with the AI."

composed_of:
  atoms:
    - Tag             # Individual chip/tag elements
    - Icon            # Optional icon per chip
  molecules: []

props:
  - name: suggestions
    type: "{ label: string; icon?: IconName; onClick: () => void }[]"
    required: true
    default: null
    description: "Suggestion definitions with display label, optional icon, and click handler"
  - name: layout
    type: '"inline" | "grid"'
    required: false
    default: "inline"
    description: "Whether chips display in a single horizontal row or a wrapping grid"
  - name: maxVisible
    type: number
    required: false
    default: null
    description: "Maximum number of visible chips; overflow hidden or truncated"
  - name: className
    type: string
    required: false
    default: null
    description: "Additional CSS class for composition"

states:
  initial: visible
  states:
    - name: visible
      description: "Suggestion chips are displayed and interactive"
    - name: one-selected
      description: "A chip has been selected; other chips may fade"
    - name: hidden
      description: "Chips are no longer visible (after selection completes)"
  transitions:
    - from: visible
      to: one-selected
      trigger: "User clicks a suggestion chip"
      visual_change: "Selected chip highlights; unselected chips fade or shrink"
    - from: one-selected
      to: hidden
      trigger: "Selection action completes"
      visual_change: "All chips animate out (fade or slide)"

composition_slots:
  - name: suggestions
    description: "Chip definitions with custom icons and labels"

accessibility:
  role: group
  aria_attributes:
    - attribute: aria-label
      source: "Static string: 'Suggestions'"
      required: true
  keyboard:
    - key: Tab
      action: "Move focus between chips"
    - key: Enter
      action: "Select the focused chip"
    - key: Space
      action: "Select the focused chip"
  focus:
    tabindex: "0"
    focus_visible: true
    trap: false
  screen_reader:
    label_source: "aria-label on the group element"
    announcements:
      - "Suggestion selected: [label]"

responsive:
  - breakpoint: mobile
    behavior: "Horizontal scroll for inline layout; wrapping grid for grid layout"
  - breakpoint: tablet
    behavior: "Wrapping inline or grid layout"
  - breakpoint: desktop
    behavior: "Wrapping inline or grid layout"
  - breakpoint: wide
    behavior: "Wrapping inline or grid layout"

tokens:
  consumes:
    - suggestion-chips.chip.bg
    - suggestion-chips.chip.border
    - suggestion-chips.chip.radius
    - suggestion-chips.chip.padding
    - suggestion-chips.chip.text
    - suggestion-chips.chip.hover_bg
    - suggestion-chips.default.gap
  inherits_from: null
