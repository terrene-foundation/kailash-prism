platform_notes:
  web: >
    Shimmer effect achieved via a CSS linear-gradient animation that slides
    from left to right (background-position animation). Use
    prefers-reduced-motion to disable the shimmer and show a static
    placeholder instead. For variant=text with multiple lines, render
    multiple div elements with the last line at 75% width. Ensure the
    component is aria-hidden=true and the parent loading container sets
    aria-busy=true.
  flutter: >
    Use a ShimmerEffect custom painter or a third-party shimmer package.
    For variant=circle, use a ClipOval. For variant=text with multiple
    lines, use a Column of Container widgets with the last at 75% width.
    Respect MediaQuery.disableAnimations to show a static placeholder.
    Set Semantics(excludeSemantics: true) to hide from the accessibility
    tree.
