# Kailash Prism — DataTable Organism Contract
# Source: docs/specs/03-component-contracts.md § 3.4.3
# Full-featured data table with sorting, filtering, selection, pagination, and virtual scroll.

version: "0.3.0"

name: DataTable
category: organism
description: "Full-featured data table with sorting, filtering, selection, pagination, and virtual scroll."

changelog:
  - version: "0.3.0"
    date: "2026-04-18"
    changes:
      - "BREAKING: ServerDataSource<T>, ServerFetchParams, ServerFetchResult, adaptLegacy(), isServerDataSource() removed from the public surface. DataSource<T> is now T[] | DataTableAdapter<T> only."
      - "Migration: rename fetchData → fetchPage; items → rows. Add getRowId + capabilities. See 0.2.2 cheatsheet."
      - "Deleted regression test web/src/__tests__/regression/server-data-source-wiring.test.ts in the same commit (orphan-detection Rule 4)."
  - version: "0.2.2"
    date: "2026-04-18"
    changes:
      - "FEAT: DataTableAdapter<T, TId> interface — bridges DataTable to any backend. Required: getRowId, capabilities, fetchPage. Optional: onRowActivate, rowActions, bulkActions, invalidate. Parallel to FormAdapter and ChatAdapter."
      - "FEAT: DataSource<T> widened to accept DataTableAdapter<T> alongside T[] and ServerDataSource<T>."
      - "FEAT: Row actions column auto-rendered when adapter.rowActions is non-empty. Anchors for href, buttons for onExecute. stopPropagation on action clicks prevents row activation."
      - "FEAT: Bulk actions merged — adapter.bulkActions + config.bulkActions render together in the bulk toolbar."
      - "FEAT: adapter.onRowActivate takes precedence over DataTableConfig.onRowClick."
      - "FEAT: adaptLegacy(source) lifts ServerDataSource to DataTableAdapter; resolveDataSource/isDataTableAdapter/isServerDataSource exported for incremental migration."
      - "DEPRECATED: ServerDataSource<T> — internal usage shimmed via adaptLegacy; public interface removed in 0.3.0 (Shard 3)."
  - version: "0.2.0"
    date: "2026-04-14"
    changes:
      - "BREAKING: ColumnDef.render signature tightened from (value: unknown, row: T) to (value: T[keyof T] | undefined, row: T)."
      - "BREAKING: DataTableRow relaxed from Record<string, unknown> to object; typed row interfaces no longer need an index signature."
      - "FIX: ServerDataSource.fetchData is now invoked by useDataTable on mount and on every page/sort/filter/search change. Auto-managed serverLoading / serverError / retryServerFetch state exposed on the hook."
      - "FEAT: DataTableConfig.getRowId?: (row, index) => string config hook. Defaults fall back to row['id'] then index."
      - "FEAT: ServerFetchParams.signal?: AbortSignal — adapters that forward to fetch() can honour cancellation."

composed_of:
  atoms:
    - Checkbox        # Row selection checkboxes
    - IconButton      # Sort indicators, action buttons
  molecules:
    - Pagination      # Page navigation
    - Toolbar         # Bulk action bar
    - FilterPanel     # Optional filter panel

props:
  - name: columns
    type: "ColumnDef[]"
    required: true
    default: null
    description: "Column definitions including header label, accessor, width, and sortability"
  - name: data
    type: "T[] | DataTableAdapter<T>"
    required: true
    default: null
    description: "Array of row data objects (client-side) OR a DataTableAdapter<T> (since 0.2.2). ServerDataSource<T> was removed in 0.3.0 — see 0.2.2 CHANGELOG for migration."
  - name: getRowId
    type: "((row: T, index: number) => string) | undefined"
    required: false
    default: null
    description: "Stable row-id extractor (since 0.2.0). Fallback: row['id'] then index. Use for non-id primary keys (payslip_id, document_uuid, composite)."
  - name: loading
    type: boolean
    required: false
    default: false
    description: "Whether to display skeleton loading rows"
  - name: selectable
    type: boolean
    required: false
    default: false
    description: "Whether rows can be selected via checkboxes"
  - name: sortable
    type: boolean
    required: false
    default: false
    description: "Whether columns can be sorted by clicking headers"
  - name: pagination
    type: "PaginationConfig | undefined"
    required: false
    default: null
    description: "Pagination configuration (page size, total items)"
  - name: onRowClick
    type: "(row: T) => void"
    required: false
    default: null
    description: "Callback fired when a row is clicked"
  - name: bulkActions
    type: "BulkAction[]"
    required: false
    default: "[]"
    description: "Actions available when rows are selected (delete, export, etc.)"
  - name: emptyState
    type: ReactNode
    required: false
    default: null
    description: "Content displayed when data array is empty"
  - name: virtualScroll
    type: boolean
    required: false
    default: false
    description: "Whether to use virtual scrolling for large datasets (1000+ rows)"
  - name: className
    type: string
    required: false
    default: null
    description: "Additional CSS class for composition"

states:
  initial: loading
  states:
    - name: loading
      description: "Skeleton rows displayed while data is being fetched"
    - name: loaded
      description: "Data rows are displayed"
    - name: empty
      description: "No data available; empty state content is shown"
    - name: error
      description: "Data fetch failed; error message is shown"
    - name: selecting
      description: "One or more rows are checked; bulk action bar appears"
    - name: sorting
      description: "A column sort is active; sort indicator shown on column header"
    - name: filtering
      description: "Filter is applied; filtered result set displayed"
  transitions:
    - from: loading
      to: loaded
      trigger: "Data fetch completes successfully"
      visual_change: "Skeleton rows replaced by real data rows"
    - from: loading
      to: empty
      trigger: "Data fetch completes with zero results"
      visual_change: "Skeleton rows replaced by empty state content"
    - from: loading
      to: error
      trigger: "Data fetch fails"
      visual_change: "Skeleton rows replaced by error message"
    - from: loaded
      to: selecting
      trigger: "User checks one or more row checkboxes"
      visual_change: "Selected rows highlighted; bulk action toolbar appears"
    - from: selecting
      to: loaded
      trigger: "User unchecks all row checkboxes"
      visual_change: "Row highlighting removed; bulk action toolbar disappears"
    - from: loaded
      to: sorting
      trigger: "User clicks a sortable column header"
      visual_change: "Sort indicator appears on column; rows reorder"
    - from: loaded
      to: filtering
      trigger: "User applies a filter"
      visual_change: "Row set narrows to match filter criteria"
    - from: filtering
      to: loaded
      trigger: "User clears all filters"
      visual_change: "Full data set restored"

composition_slots:
  - name: emptyState
    description: "Custom content for the zero-results state"
  - name: bulkActions
    description: "Action definitions for the selection toolbar"
  - name: columns
    description: "Column definitions including custom cell renderers"

accessibility:
  role: table
  aria_attributes:
    - attribute: aria-label
      source: "Provided by consumer or inferred from context"
      required: false
    - attribute: aria-sort
      source: "Column header reflects current sort direction (ascending, descending, none)"
      required: true
    - attribute: aria-label
      source: "Row checkboxes include row identifier in label"
      required: true
  keyboard:
    - key: Tab
      action: "Move focus between table controls (headers, checkboxes, pagination)"
    - key: Enter
      action: "Activate sort on focused column header or trigger row click"
    - key: Space
      action: "Toggle row selection checkbox"
    - key: ArrowUp
      action: "Move focus to previous row"
    - key: ArrowDown
      action: "Move focus to next row"
  focus:
    tabindex: "0"
    focus_visible: true
    trap: false
  screen_reader:
    label_source: "aria-label on the table element"
    announcements:
      - "Sorted by [column] ascending/descending when sort changes"
      - "[N] rows selected when selection changes"
      - "Page [N] of [M] when pagination changes"

responsive:
  - breakpoint: mobile
    behavior: "Card layout (each row becomes a card) or horizontal scroll with sticky first column"
  - breakpoint: tablet
    behavior: "Horizontal scroll with visible column headers"
  - breakpoint: desktop
    behavior: "Full table layout with all columns visible"
  - breakpoint: wide
    behavior: "Full table layout with extra spacing"

tokens:
  consumes:
    - data-table.header.bg
    - data-table.header.text
    - data-table.header.border
    - data-table.row.bg
    - data-table.row.hover_bg
    - data-table.row.selected_bg
    - data-table.row.border
    - data-table.cell.padding
    - data-table.default.radius
  inherits_from: null

# Adapter contract (full spec: docs/specs/05-engine-specifications.md § 5.1.1)
# Status: SHIPPED in 0.2.2 (7 of 9 methods — filterDimensions + subscribe
# reserved for 0.4.0). ServerDataSource removed in 0.3.0.
adapter:
  name: DataTableAdapter
  version_introduced: "0.2.2"
  supersedes: ServerDataSource  # removed in 0.3.0
  authority: "docs/specs/05-engine-specifications.md § 5.1.1"
  migration_findings:
    - "workspaces/fe-codegen-platform/04-validate/migration-m02-findings.md"
    - "workspaces/fe-codegen-platform/04-validate/migration-m03-findings.md"

  type_parameters:
    - name: T
      description: "Row type. No constraint beyond `object` (pending M-04 BLOCKING-3 fix)."
    - name: TId
      default: string
      description: "Row identity type returned by getRowId."

  methods:
    # --- Required (3) ---
    - name: getRowId
      signature: "(row: T) => TId"
      required: true
      purpose: "Stable row identity; replaces hardcoded row['id'] lookup."

    - name: capabilities
      signature: "() => DataTableCapabilities"
      required: true
      purpose: "Declare which query ops the backend supports natively; engine falls back client-side for the rest."

    - name: fetchPage
      signature: "(query: DataTableQuery) => Promise<DataTablePage<T>>"
      required: true
      purpose: "Fetch one page. Engine drives all state changes through this method."

    # --- Optional (6) ---
    - name: onRowActivate
      signature: "(row: T) => Promise<void> | void"
      required: false
      purpose: "Row click / keyboard activation handler."

    - name: rowActions
      signature: "ReadonlyArray<DataTableRowAction<T, TId>>"
      required: false
      purpose: "Static per-row action buttons with predicate visibility/enablement."

    - name: bulkActions
      signature: "ReadonlyArray<DataTableBulkAction<T, TId>>"
      required: false
      purpose: "Multi-row selection actions."

    - name: filterDimensions
      signature: "ReadonlyArray<FilterDimension>"
      required: false
      purpose: "Faceted filter declarations with static or async-loaded options."

    - name: subscribe
      signature: "(onChange: () => void) => () => void"
      required: false
      purpose: "Coarse live-update signal; engine refetches on every onChange."

    - name: invalidate
      signature: "() => Promise<void> | void"
      required: false
      purpose: "Clear adapter caches after mutations; engine calls after rowAction/bulkAction success."

  support_types:
    - DataTableCapabilities
    - DataTableQuery
    - DataTableSort
    - DataTablePage
    - DataTableRowAction
    - DataTableBulkAction
    - FilterDimension
    - FilterDimensionOption

  design_decisions:
    one_adapter_or_mixins: "one interface with optional methods"
    capabilities_vs_auto_detection: "explicit capabilities() — engine owns client-side fallback"
    rowActions_shape: "static array with visible/disabled predicates"
    filterDimensions_location: "on DataTableAdapter, not a sibling FilterAdapter"
    serverDataSource_deprecation: "two-release window: deprecated in 0.2.2, removed in 0.3.0"
    row_type_constraint: "getRowId owns identity; no mapRow; relies on M-04 relaxing DataTableRow to `object`"
    subscribe_granularity: "coarse (refetch signal) not fine-grained deltas"
    pagination_split: "single interface, paginationMode capability flag distinguishes offset vs cursor"

  loc_savings_estimate:
    m02_baseline_loc: 604
    m02_adapter_loc: 172
    m03_baseline_loc: 715
    m03_adapter_loc: 309
    combined_savings_pct: 58
