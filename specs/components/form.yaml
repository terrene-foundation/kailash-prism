# Kailash Prism — Form Organism Contract
# Source: docs/specs/03-component-contracts.md § 3.4.4
# Data entry form with validation, submission handling, and error reporting.

version: "0.2.1"

name: Form
category: organism
description: "Data entry form with validation, submission handling, and error reporting."

changelog:
  - version: "0.2.1"
    date: "2026-04-18"
    changes:
      - "FEAT: FormAdapter<TValues, TResult> interface — bridges Form to domain service. Methods: initialValues?(), validate?(), submit(), renderResult?(), onReset?()."
      - "FEAT: FormConfig.adapter?: FormAdapter — when present, adapter owns submit orchestration, result caching, and post-submit render slot. Replaces the {values, result} state machine every consumer re-implements today (M-01 BLOCKING-2)."
      - "FEAT: FormConfig.onSubmit is now optional — Form requires EITHER onSubmit OR adapter. Passing both emits a dev-mode warn and the adapter wins; passing neither throws a clear Error at mount."
      - "STATE: FormState.submission: FormSubmission | null — most recent successful adapter submit. Cleared on edit (post-success) and on reset."
  - version: "0.2.0"
    date: "2026-04-14"
    changes:
      - "FEAT: FieldDef.render?: (ctx: FieldRenderContext) => ReactNode — custom field renderer that preserves label/help/error wrapper."
      - "FEAT: FormConfig.renderActions?: (state) => ReactNode — replace default submit+reset button row."
      - "FEAT: FormConfig.submitDisabledWhen?: (state) => boolean — predicate-based submit disable."
      - "FEAT: FormConfig.classNames — per-element className overrides (form, section, field, label, input, error, helpText, actions, submitButton, resetButton). Inline --prism-* style fallback skipped when override supplied."

composed_of:
  atoms:
    - Button          # Submit and reset buttons
  molecules:
    - FormField       # Repeated form fields (label + input + error)
    - DialogActions   # Submit/cancel button group

props:
  - name: onSubmit
    type: "(values: Record<string, any>) => void"
    required: false
    default: null
    description: "Fire-and-forget submit handler. Required unless `adapter` is provided (since 0.2.1). If both are supplied, adapter wins and a dev-mode warn fires."
  - name: adapter
    type: "FormAdapter<TValues, TResult> | undefined"
    required: false
    default: null
    description: "Domain adapter (since 0.2.1). When present, owns submit orchestration, initial-value seeding, async validation, and post-submit result rendering. Use for request/response forms (calculators, generate endpoints)."
  - name: onReset
    type: "() => void"
    required: false
    default: null
    description: "Callback fired when the form is reset to initial values"
  - name: initialValues
    type: "Record<string, any>"
    required: false
    default: "{}"
    description: "Initial field values when the form first renders"
  - name: validation
    type: "ValidationSchema | undefined"
    required: false
    default: null
    description: "Validation schema applied on submit or on blur per field"
  - name: children
    type: ReactNode
    required: true
    default: null
    description: "FormField elements composing the body of the form"
  - name: className
    type: string
    required: false
    default: null
    description: "Additional CSS class for composition"
  - name: renderActions
    type: "((state: FormActionsState) => ReactNode) | undefined"
    required: false
    default: null
    description: "Custom action row (since 0.2.0). Replaces default submit+reset. Receives submit() and reset() callbacks plus form state."
  - name: submitDisabledWhen
    type: "((state) => boolean) | undefined"
    required: false
    default: null
    description: "Predicate returning true when submit should be disabled (since 0.2.0). Combined with the built-in 'disabled while submitting' rule."
  - name: classNames
    type: "FormClassNames | undefined"
    required: false
    default: null
    description: "Per-element className overrides (since 0.2.0): form, section, field, label, input, error, helpText, actions, submitButton, resetButton."

states:
  initial: pristine
  states:
    - name: pristine
      description: "No changes have been made to any field"
    - name: dirty
      description: "One or more field values differ from initial values"
    - name: validating
      description: "Validation is running (on submit)"
    - name: submitting
      description: "Async submission in progress"
    - name: submitted
      description: "Form submitted successfully"
    - name: error
      description: "Validation failed or server returned an error"
  transitions:
    - from: pristine
      to: dirty
      trigger: "User changes any field value"
      visual_change: "Submit button may become enabled"
    - from: dirty
      to: validating
      trigger: "User clicks submit"
      visual_change: "Validation runs; field errors may appear"
    - from: validating
      to: error
      trigger: "Validation fails"
      visual_change: "Error messages appear below invalid fields; focus moves to first error"
    - from: validating
      to: submitting
      trigger: "Validation passes"
      visual_change: "Submit button shows loading spinner; form fields disabled"
    - from: submitting
      to: submitted
      trigger: "Server responds with success"
      visual_change: "Success feedback shown; form may reset or close"
    - from: submitting
      to: error
      trigger: "Server responds with error"
      visual_change: "Server error message displayed; form fields re-enabled"
    - from: error
      to: dirty
      trigger: "User modifies a field"
      visual_change: "Field-level error clears for the changed field"
    - from: dirty
      to: pristine
      trigger: "User clicks reset or form is programmatically reset"
      visual_change: "All fields revert to initial values; errors cleared"

composition_slots:
  - name: children
    description: "FormField elements defining the form layout"
  - name: actions
    description: "Custom submit/cancel button group replacing default DialogActions"

accessibility:
  role: form
  aria_attributes:
    - attribute: aria-label
      source: "Provided by consumer describing the form purpose"
      required: true
    - attribute: aria-live
      source: "Polite region for validation error announcements"
      required: true
  keyboard:
    - key: Tab
      action: "Move focus between form fields sequentially"
    - key: Enter
      action: "Submit the form (when focus is on submit button or single-field form)"
    - key: Escape
      action: "Reset or cancel (if applicable)"
  focus:
    tabindex: "0"
    focus_visible: true
    trap: false
  screen_reader:
    label_source: "aria-label on the form element"
    announcements:
      - "Form submitted successfully"
      - "[N] validation errors found — focus moved to first error"

responsive:
  - breakpoint: mobile
    behavior: "Single-column layout; full-width fields"
  - breakpoint: tablet
    behavior: "Single-column layout with wider fields"
  - breakpoint: desktop
    behavior: "Multi-column layout possible (2 columns for short fields)"
  - breakpoint: wide
    behavior: "Same as desktop with max-width constraint"

tokens:
  consumes:
    - form.default.padding
    - form.default.gap
  inherits_from: null
