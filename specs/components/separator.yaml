platform_notes:
  web: >
    Render as an <hr> element for horizontal or a <div role="separator">
    for vertical. Unlike Divider, Separator carries semantic meaning and
    should always use the separator ARIA role. It does not support a label
    prop (use Divider with-label variant for that). Inherits Divider tokens
    as a base and overrides only the consumed tokens. Useful inside toolbars,
    menus, and grouped lists to indicate logical section boundaries.
  flutter: >
    Use the built-in Divider widget for horizontal and VerticalDivider for
    vertical. Wrap in Semantics(label: 'Separator') to ensure the
    accessibility tree conveys the semantic boundary. Separator is a
    simplified Divider without label support — use it for toolbar and
    menu group boundaries. Inherits Divider token values; override only
    separator-specific tokens if the theme requires visual distinction.
