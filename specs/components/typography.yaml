platform_notes:
  web: >
    When the "as" prop is not specified, auto-detect the HTML element from the
    variant: h1-h4 map to their respective heading elements, body/body-sm/caption
    map to <p>, code maps to <code>, label maps to <label>, display maps to <h1>.
    For truncation, use CSS text-overflow: ellipsis with overflow: hidden and
    white-space: nowrap. For maxLines, use -webkit-line-clamp with
    display: -webkit-box. Ensure heading hierarchy is semantically correct even
    when visual variant and rendered element differ (e.g., variant="h2" as="h3").
  flutter: >
    Map each variant to a TextStyle from the ThemeData.textTheme. Use the Text
    widget with maxLines and overflow: TextOverflow.ellipsis for truncation.
    The "as" prop concept does not apply in Flutter — semantics come from the
    Semantics widget (e.g., Semantics(header: true) for headings). For the
    code variant, use a monospace fontFamily. Align via TextAlign parameter.
    Use DefaultTextStyle.merge for inherited color overrides.
