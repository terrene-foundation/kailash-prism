# Kailash Prism — Conversation Page Template
# AI chat interface with conversation history, message stream, and auxiliary panels.
# See docs/specs/06-page-templates.md section 6.2.7 for the full specification.

version: "0.2.0"

template:
  name: Conversation
  description: >
    AI chat interface with conversation history, message stream,
    and auxiliary panels. Supports two modes: wired (adapter-driven
    turnkey) and manual (consumer-composed).
  use_cases:
    - AI assistant
    - Support chat
    - Customer service
    - Knowledge base Q&A
    - Code generation assistant
    - HR advisory (arbor pilot — validated 2026-04-14)

  modes:
    wired:
      description: >
        Pass a ChatAdapter and the template internally composes
        ConversationSidebar, ChatEngine, and useChatState/KChatState.
      required_props:
        - adapter  # ChatAdapter / KChatAdapter implementation
      optional_props:
        - renderMeta        # Domain badges per conversation (e.g. risk tier)
        - renderMessageActions  # Per-message actions (e.g. feedback, escalation)
        - sendContext        # Record<string, unknown> forwarded to every adapter.sendMessage call (e.g. company_id)
        - avatars           # User/assistant avatars
        - features          # Feature toggles (citations, toolCalls, etc.)
        - input             # Input config (placeholder, maxLength, enableVoice)
        - renderContent     # Override chat content entirely
        - renderSidebar     # Override sidebar entirely
        - onMessageSent     # Side-effect callback after send
        - onConversationChange  # Callback when active conversation changes
      auto_wraps:
        - LayoutProvider    # Detects if missing, wraps automatically
    manual:
      description: >
        Pass conversationList + content as ReactNode/Widget for
        full control. No internal state management.
      required_props:
        - content
      optional_props:
        - conversationList
        - detailPanel
        - listWidth
        - detailWidth

  navigation:
    renders_inside: navigation-engine
    note: >
      Conversation template typically IS the main page. If used within a
      larger app, it renders inside navigation content area. The conv-sidebar
      replaces (does not duplicate) the main navigation sidebar for
      conversation management.

  layout:
    root: Row
    direction: horizontal

  zones:
    conv-sidebar:
      description: Conversation list + search + new conversation button.
      content_type: navigation
      layout:
        primitive: Stack
        props:
          direction: vertical
      default_engine: Chat
      default_section: conversationList
      default_props:
        source: "api:/conversations"
        group_by: date
      responsive:
        wide:
          visible: true
          width: 320px
          display: panel
        desktop:
          visible: true
          width: 260px
          display: panel
        tablet:
          visible: true
          width: 60px
          display: icon-rail
          description: Sidebar as icon rail (60px).
        mobile:
          visible: false
          display: drawer
          trigger: hamburger
          description: Sidebar as drawer (hamburger button).

    chat-header:
      description: Conversation title + action buttons (search, settings).
      content_type: actions
      layout:
        primitive: Row
        props:
          justify: between
      default_engine: Chat
      default_section: header
      default_props:
        title: "bind:conversation.title"
        actions:
          - search
          - settings
      responsive:
        wide:
          visible: true
        desktop:
          visible: true
        tablet:
          visible: true
        mobile:
          visible: true

    message-area:
      description: Message list with virtual scrolling.
      content_type: chat
      layout:
        primitive: Scroll
        props:
          direction: vertical
      default_engine: Chat
      default_section: messages
      default_props:
        endpoint: "wss://api.example.com/chat"
        protocol: websocket
        features:
          citations: true
          tool_calls: true
          action_plans: true
          suggestions: true
      responsive:
        wide:
          visible: true
        desktop:
          visible: true
        tablet:
          visible: true
        mobile:
          visible: true

    chat-input:
      description: Input area + suggestion chips.
      content_type: chat
      layout:
        primitive: Stack
        props:
          direction: vertical
      default_engine: Chat
      default_section: input
      default_props:
        placeholder: "Ask anything..."
        attachments: true
        voice: false  # opt-in via input.enableVoice (Web Speech Recognition API)
        sources: []
      responsive:
        wide:
          visible: true
        desktop:
          visible: true
        tablet:
          visible: true
        mobile:
          visible: true
          sticky: true
          sticky_position: bottom
          description: chat-input fixed to bottom.

    info-panel:
      description: Citation panel, tool results, or contextual info.
      content_type: any
      layout:
        primitive: Stack
        props:
          direction: vertical
      default_engine: Chat
      default_section: citations
      responsive:
        wide:
          visible: true
          width: 380px
          display: panel
        desktop:
          visible: false
          width: 280px
          display: panel-togglable
          description: >
            Info-panel togglable (hidden by default, shown on citation click).
        tablet:
          visible: false
          display: slide-over
          slide_from: right
          description: Info-panel as slide-over from right.
        mobile:
          visible: false
          display: bottom-sheet
          description: Info-panel as bottom sheet.

  responsive_transformations:
    wide:
      min_width: 1440
      description: >
        Three-column: sidebar (320px) + chat + info-panel (380px).
    desktop:
      min_width: 1024
      max_width: 1439
      description: >
        Three-column: sidebar (260px) + chat + info-panel (280px).
        Info-panel togglable (hidden by default, shown on citation click).
    tablet:
      min_width: 768
      max_width: 1023
      description: >
        Two-column: sidebar as icon rail (60px) + chat.
        Info-panel as slide-over from right.
    mobile:
      min_width: 0
      max_width: 767
      description: >
        Single column: chat only. Sidebar as drawer (hamburger).
        Info-panel as bottom sheet. chat-input fixed to bottom.
